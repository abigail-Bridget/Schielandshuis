<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schielandshuis Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="experience.css">
</head>
<body>

<main class="experience-page">
    <section class="experience-container">
        <h1 id="year" class="year"></h1>

        <button id="prev" class="nav-arrow left">&#10094;</button>

        <div class="image-wrapper">
            <img id="main-image" src="" alt="Schielandshuis tijdperk">
            <div id="hotspots"></div>
        </div>

        <button id="next" class="nav-arrow right">&#10095;</button>

        <div id="popup" class="popup hidden">
            <button id="close-popup" class="close-btn">&times;</button>
            <h2 id="popup-title"></h2>
            <img id="popup-img" src="" alt="Hotspot afbeelding">
            <p id="popup-text"></p>
            <button id="more-btn" class="more-btn">Meer info</button>
        </div>

        <div id="big-popup" class="big-popup hidden">
            <div class="big-popup-card">
                <div class="big-popup-header">
                    <button id="close-big-popup" class="big-close-btn">&times;</button>
                </div>

                <div class="big-popup-content">
                    <h2 id="big-title"></h2>

                    <img id="big-img-left" class="big-main-img" src="" alt="Uitgebreide afbeelding">

                    <p id="big-text"></p>
                    <p id="big-text-extra-1"></p>

                    <img id="big-img-right" class="big-secondary-img" src="" alt="Tweede afbeelding">

                    <p id="big-text-extra-2"></p>

                    <img id="big-img-bottom" class="big-secondary-img" src="" alt="Derde afbeelding">
                </div>
            </div>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
